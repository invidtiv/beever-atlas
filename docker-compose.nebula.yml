# NebulaGraph services for pluggable graph DB testing
# Usage:
#   docker compose -f docker-compose.nebula.yml up -d
#   # Wait ~30s, then register storage host:
#   docker compose -f docker-compose.nebula.yml exec nebula-graphd \
#     sh -c 'sleep 5 && echo "ADD HOSTS nebula-storaged:9779;" | /usr/local/nebula/bin/nebula-console -addr nebula-graphd -port 9669 -u root -p nebula'
#   # Or use the helper script:
#   python scripts/nebula_setup.py

services:
  nebula-metad:
    image: vesoft/nebula-metad:v3.8.0@sha256:ab687bd32d3e441d436842b41427ba0961a5e169c46997ef03fa4dcfd5388b35
    environment:
      USER: root
      TZ: UTC
    command:
      - --meta_server_addrs=nebula-metad:9559
      - --local_ip=nebula-metad
      - --ws_ip=nebula-metad
      - --port=9559
      - --ws_http_port=19559
      - --data_path=/data/meta
      - --log_dir=/logs
      - --v=0
      - --minloglevel=0
    volumes:
      - nebula_meta_data:/data/meta
      - nebula_meta_logs:/logs
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://nebula-metad:19559/status"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    ports:
      - "127.0.0.1:9559:9559"
      - "127.0.0.1:19559:19559"

  nebula-storaged:
    image: vesoft/nebula-storaged:v3.8.0@sha256:7142642ee69001a5b5c50520196538d58bb2ec3930707c067cb4c4e2be3890f9
    environment:
      USER: root
      TZ: UTC
    command:
      - --meta_server_addrs=nebula-metad:9559
      - --local_ip=nebula-storaged
      - --ws_ip=nebula-storaged
      - --port=9779
      - --ws_http_port=19779
      - --data_path=/data/storage
      - --log_dir=/logs
      - --v=0
      - --minloglevel=0
    volumes:
      - nebula_storage_data:/data/storage
      - nebula_storage_logs:/logs
    depends_on:
      nebula-metad:
        condition: service_healthy
    # No healthcheck — storaged is healthy once metad registers it via ADD HOSTS
    ports:
      - "127.0.0.1:9779:9779"

  nebula-graphd:
    image: vesoft/nebula-graphd:v3.8.0@sha256:1040573cc684ea6cc5e673b667422e9abab607c9d553c2c17c7bac6ad8a74e05
    environment:
      # Nebula ships with default auth root/nebula. After first boot, rotate
      # via `ALTER USER root WITH PASSWORD '${NEBULA_PASSWORD}'` and update
      # clients to use ${NEBULA_PASSWORD:?NEBULA_PASSWORD must be set}.
      NEBULA_PASSWORD: ${NEBULA_PASSWORD:?NEBULA_PASSWORD must be set}
      USER: root
      TZ: UTC
    command:
      - --meta_server_addrs=nebula-metad:9559
      - --local_ip=nebula-graphd
      - --ws_ip=nebula-graphd
      - --port=9669
      - --ws_http_port=19669
      - --log_dir=/logs
      - --v=0
      - --minloglevel=0
    volumes:
      - nebula_graph_logs:/logs
    depends_on:
      nebula-metad:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://nebula-graphd:19669/status"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    ports:
      - "127.0.0.1:9669:9669"
      - "127.0.0.1:19669:19669"

volumes:
  nebula_meta_data:
  nebula_meta_logs:
  nebula_storage_data:
  nebula_storage_logs:
  nebula_graph_logs:
