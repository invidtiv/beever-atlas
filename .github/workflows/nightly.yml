name: Nightly Contract Tests

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  contracts:
    name: Graph backend contract tests
    runs-on: ubuntu-latest

    services:
      neo4j:
        image: neo4j:5.26
        env:
          NEO4J_AUTH: neo4j/beever_atlas_dev
          NEO4J_PLUGINS: '["apoc"]'
        ports:
          - 7687:7687
          - 7474:7474
        options: >-
          --health-cmd "wget -q -O- http://localhost:7474 || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20

      nebula-metad:
        image: vesoft/nebula-metad:v3.8.0
        ports:
          - 9559:9559

      nebula-storaged:
        image: vesoft/nebula-storaged:v3.8.0
        ports:
          - 9779:9779

      nebula-graphd:
        image: vesoft/nebula-graphd:v3.8.0
        ports:
          - 9669:9669

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --extra dev --extra nebula

      - name: Run contract tests
        env:
          NEO4J_URI: bolt://localhost:7687
          NEO4J_AUTH: neo4j/beever_atlas_dev
          NEBULA_HOSTS: 127.0.0.1:9669
          NEBULA_USER: root
          NEBULA_PASSWORD: nebula
          NEBULA_SPACE: beever_atlas
        run: uv run pytest tests/contracts/ -v
