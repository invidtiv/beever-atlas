name: Security Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 12 * * 1"

concurrency:
  group: audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: pip-audit + npm audit (HIGH/CRITICAL gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Export locked requirements (without editable project)
        run: uv export --quiet --no-emit-project --format requirements-txt --no-hashes > /tmp/requirements-audit.txt

      - name: pip-audit (Python deps)
        run: uv run --with pip-audit pip-audit --requirement /tmp/requirements-audit.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: npm audit (web)
        working-directory: web
        run: npm audit --audit-level=high

      - name: npm audit (bot)
        working-directory: bot
        run: npm audit --audit-level=high
