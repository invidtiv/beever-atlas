name: Bug report
description: Report a defect in Beever Atlas
title: "[bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much
        detail as you can so we can reproduce it quickly.
  - type: input
    id: version
    attributes:
      label: Version
      description: Beever Atlas version or commit SHA
      placeholder: "0.1.0 / commit abcd1234"
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Backend (Python / FastAPI)
        - Web (React)
        - Bot (TypeScript)
        - Ingestion pipeline
        - Wiki generation
        - Ask / QA
        - Graph (Neo4j / NebulaGraph)
        - Docker / deployment
        - Other
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      render: shell
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        - OS:
        - Python version:
        - Node version:
        - Docker version:
        - Graph backend (neo4j / nebula):
